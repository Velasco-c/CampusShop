<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Campus Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="activador">
        <img src="imagenes/campushop.png" alt="logo">
    </div>

    <div class="search-box">
        <div class="search-icon">
            <img src="iconos/search.svg" alt="">
        </div>
        <input type="text" placeholder="Buscar productos...">
    </div>

    <div class="iconos">
        <div class="search-icon">
            <img src="iconos/buy.svg" alt="">
        </div>
    </div>
</header>

<main class="cart-empty">
    <div class="grid empty-box">

        <div class="cart-icon">
            <img src="iconos/empty-cart.svg" alt="Carrito Vacío">
        </div>

        <h1>Tu carrito está vacío</h1>

        <p>
            Parece que aún no has añadido productos.<br>
            Explora nuestro catálogo y encuentra algo increíble.
        </p>

        <a href="index.html" class="btn-products">
            Explorar Catálogo
        </a>
    </div>
</main>

<footer class="minimal-footer">
    <div class="social-icons">
        <a href="#"><img src="iconos/github.svg" alt=""></a>
        <a href="#"><img src="iconos/linkedin.svg" alt=""></a>
        <a href="#"><img src="iconos/instagram.svg" alt=""></a>
    </div>
    <p class="footer-legal">&copy; 2026 | Carlos Tzoy</p>
</footer>

</body>
</html>
