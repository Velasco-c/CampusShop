<!DOCTYPE html>

<head>

    <title>Carrito | Campus Shop</title>

<body>

<header>
    <div class="activador">
        <img src="imagenes/campushop.png" alt="logo">
    </div>

    <div class="search-box">
        <div class="search-icon">
            <img src="iconos/search.svg" alt="">
        </div>
